<!doctype html>
<html lang="uk">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Одеська школа мистецтв №5</title>
		<meta name="description" content="Ваш шлях до музичної майстерності" />
		<meta property="og:title" content="Одеська школа мистецтв №5" />
		<meta property="og:description" content="Ваш шлях до музичної майстерності" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://alik532ua.github.io/as5.odesa.ua/" />
		<meta property="og:image" content="https://alik532ua.github.io/as5.odesa.ua/ods-as5-logo-full_AlphaChannel.png" />
		<meta property="og:image:secure_url" content="https://alik532ua.github.io/as5.odesa.ua/ods-as5-logo-full_AlphaChannel.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Одеська школа мистецтв №5" />
		<meta name="twitter:description" content="Ваш шлях до музичної майстерності" />
		<meta name="twitter:image" content="https://alik532ua.github.io/as5.odesa.ua/ods-as5-logo-full_AlphaChannel.png" />
		<meta name="theme-color" content="#1B5E7B" />
		<script>
			try {
				var t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.setAttribute('data-theme', 'dark');
					document.documentElement.classList.add('dark-theme');
				} else {
					document.documentElement.setAttribute('data-theme', 'light');
					document.documentElement.classList.remove('dark-theme');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
